name: PersonalLibrary
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"
  developmentLanguage: zh-Hans

packages:
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    from: "0.14.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  PersonalLibrary:
    type: application
    platform: iOS
    sources:
      - path: PersonalLibrary
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: CoreXLSX
    # iCloud entitlements 暂时禁用（免费开发者账号不支持）
    # 付费 Apple Developer 账号后可恢复：
    # entitlements:
    #   path: PersonalLibrary/PersonalLibrary.entitlements
    #   properties:
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.com.example.PersonalLibrary
    #     com.apple.developer.icloud-services:
    #       - CloudDocuments
    #       - CloudKit
    info:
      path: PersonalLibrary/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "wx_YOUR_APP_ID"
            CFBundleURLName: "weixin"
        LSApplicationQueriesSchemes:
          - weixin
          - weixinULAPI
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "需要使用摄像头扫描图书条形码"
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDisplayName: "私人图书馆"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.PersonalLibrary
        DEVELOPMENT_TEAM: YOUR_TEAM_ID
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.6"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: "\"PersonalLibrary/Preview Content\""

  PersonalLibraryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PersonalLibraryTests
    dependencies:
      - target: PersonalLibrary
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PersonalLibrary.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PersonalLibrary"

  PersonalLibraryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PersonalLibraryUITests
    dependencies:
      - target: PersonalLibrary
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PersonalLibrary
